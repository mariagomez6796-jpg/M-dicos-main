services:
  mysql:
    image: mysql:8.0
    container_name: crudg_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: CRUDG
    ports:
      - "4306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./CRUDG        # 📂 carpeta donde está tu backend
      dockerfile: Dockerfile   # 📄 nombre exacto del Dockerfile
    container_name: crudg_backend
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/CRUDG?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
     

  frontend:
    build:
      context: ./vitalapp-auth  # 📂 carpeta donde está tu frontend
      dockerfile: Dockerfile    # 📄 nombre exacto del Dockerfile del frontend
    container_name: crudg_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - api-citas
    environment:
      # --- ¡¡LA CONFIGURACIÓN FINAL Y CORRECTA!! ---
      # "use client" fuerza a que el NAVEGADOR haga las llamadas.
      # El navegador SÍ puede ver 'localhost:8080' y 'localhost:8001'.
      
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_API_CITAS_URL: http://localhost:8001
    
  
  api-citas:
    build:
      context: ./appointments-api # 📂 carpeta donde está la API de citas
      dockerfile: Dockerfile      
    
    
    container_name: appointments-api
    restart: always
    
    # Le dice a Docker que inicie la API solo después de que la BD esté lista
    depends_on:
      - mysql
      
    # Comando para correr la API de citas DENTRO del contenedor
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    
    
    volumes:
      - ./appointments-api:/app
      
    ports:
      
      - "8001:8000"
      
    # Variables de entorno para que la API de cita se conecte a la BD
    environment:
      DB_HOST: mysql           # 👈 Usa el nombre del servicio 'mysql', NO 'localhost'
      DB_PORT: 3306            # 👈 Usa el puerto INTERNO de Docker (3306), NO 3307
      DB_USER: root
      DB_PASS: root
      DB_NAME: CRUDG

  videoapi:
    build: ./videocalls-api
    container_name: crudg_videoapi
    restart: always
    depends_on:
      - mysql
    environment:
      # Mismo secreto JWT que el backend Java, para aceptar su token
      JWT_SECRET: MiSuperClaveDeSeguridadParaVitalApp1234567890
      # DB: usa el mismo MySQL y la misma base para simplificar (crea sus propias tablas)
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: CRUDG
      DB_USER: root
      DB_PASS: root
    ports:
      - "8000:8000"    

  treatments-api:
    container_name: treatments-api
    restart: always
    build:
      context: ./treatments-api # <-- Carpeta nueva
      dockerfile: Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./treatments-api:/app
    ports:
      - "8003:8000" # Acceso público: localhost:8003
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: CRUDG  
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  chat-api:
    build:
      context: ./chat-api
      dockerfile: Dockerfile
    container_name: chat-api
    restart: always
    depends_on:
      - mysql
      - redis
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./chat-api:/app
    ports:
      - "8004:8000"  # External: localhost:8004, Internal: 8000
    environment:
      # Application
      APP_NAME: chat-api
      APP_VERSION: 1.0.0
      APP_ENV: development
      DEBUG: true
      LOG_LEVEL: INFO
      
      # Database (shared MySQL)
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: CRUDG
      DB_POOL_SIZE: 20
      DB_MAX_OVERFLOW: 10
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      
      # JWT (shared secret with backend)
      JWT_SECRET_KEY: MiSuperClaveDeSeguridadParaVitalApp1234567890
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # WebSocket
      WEBSOCKET_PING_INTERVAL: 30
      WEBSOCKET_PING_TIMEOUT: 10
      WEBSOCKET_MAX_CONNECTIONS_PER_USER: 5
      WEBSOCKET_MESSAGE_MAX_SIZE: 10000
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: true
      RATE_LIMIT_REQUESTS_PER_MINUTE: 60
      
      # External Services
      APPOINTMENTS_API_URL: http://appointments-api:8000
      APPOINTMENTS_API_TIMEOUT: 10
      
      # Conversation
      CONVERSATION_EXPIRY_DAYS: 14
      CONVERSATION_CLEANUP_INTERVAL_HOURS: 24
      
      # CORS
      CORS_ORIGINS: http://localhost:3000


volumes:
  mysql-data:
  redis-data: